services:
  app:
    image: cosmtrek/air:v1.62.0
    working_dir: /project
    ports:
      - 8080:8080
    volumes:
      - .:/project/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 3s
      timeout: 2s
      retries: 10
      start_period: 1s
    environment:
      PORT: "8080"
